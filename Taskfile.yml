version: "3"

# IFWG build/dev tasks.
# Only requirement: https://taskfile.dev — everything else runs inside Docker.
#
# Common workflows:
#   task build         Lint, build WASM, and bundle minified player JS
#   task build:explorer  Build native dfrotz and explorer binary
#   task dist          Build and assemble deployable package in dist/
#   task lint          Run ESLint on player JS
#   task serve         Serve locally at http://localhost:5173
#   task clean         Remove build artifacts

vars:
  EMSDK_IMAGE:  emscripten/emsdk:3.1.1
  NODE_IMAGE:   node:20-alpine
  NGINX_IMAGE:  nginx:alpine
  GO_IMAGE:     golang:1.24-bookworm
  ALPINE_RUN:   docker run --rm -v "{{.ROOT_DIR}}:/repo" alpine
  EMSDK_RUN:    docker run --rm -v "{{.ROOT_DIR}}:/repo" -w /repo/wasm {{.EMSDK_IMAGE}}
  NODE_RUN:     docker run --rm -v "{{.ROOT_DIR}}/src:/src" -w /src {{.NODE_IMAGE}}
  GO_RUN:       docker run --rm -v "{{.ROOT_DIR}}:/repo" -w /repo/tools/explorer {{.GO_IMAGE}}

tasks:
  default:
    silent: true
    cmd: task --list

  build:
    desc: Lint, build WASM interpreter, and bundle minified player JS
    cmds:
      - task: lint
      - task: build:wasm
      - task: build:js

  dist:
    desc: Build and assemble deployable player package in dist/
    cmds:
      - task: build:wasm
      - task: build:js
      - "{{.ALPINE_RUN}} sh -c '\
          rm -rf /repo/dist && \
          mkdir -p /repo/dist/wasm /repo/dist/prompt && \
          cp /repo/web/index.html /repo/src/player.css /repo/dist/ && \
          cp -r /repo/src/js /repo/dist/js && \
          cp /repo/src/wasm/ifwg.js /repo/src/wasm/ifwg.wasm /repo/dist/wasm/ && \
          cp /repo/src/dist/ifwg-player.js /repo/dist/ && \
          cp /repo/src/prompt/* /repo/dist/prompt/ \
        '"

  explore:
    desc: "Walk a game and write rooms JSON — task explore stories=C:\\path story=game.z5 [walkthrough=tools/explorer/games/zork1/walkthroughs/zork1.txt] [out=tools/explorer/games/zork1/bfs.json] [loop=1]"
    vars:
      out:      '{{.out | default "tools/explorer/games/zork1/bfs.json"}}'
      wt_flag:  '{{if .walkthrough}}-walkthrough /repo/{{.walkthrough}}{{end}}'
      lp_flag:  '{{if .loop}}-loop{{end}}'
    cmd: >
      docker run --rm
      -v "{{.ROOT_DIR}}:/repo"
      -v "{{.stories}}:/stories:ro"
      -w /repo/tools/explorer
      {{.GO_IMAGE}}
      ./bin/explorer --frotz ./frotz/bin/dfrotz --out /repo/{{.out}} {{.wt_flag}} {{.lp_flag}} /stories/{{.story}}

  build:explorer:
    desc: Build native dfrotz and explorer binary
    cmds:
      - "{{.GO_RUN}} make -B -C frotz"
      - "{{.GO_RUN}} sh -c 'go mod tidy && mkdir -p bin && go build -o bin/explorer .'"

  imagegen:
    desc: "Batch-generate room images — task imagegen [rooms=tools/explorer/games/zork1/bfs.json] [out=web/images] [concurrency=3] [limit=0] [model=gpt-image-2-2026-04-21]"
    vars:
      rooms:       '{{.rooms | default "tools/explorer/games/zork1/bfs.json"}}'
      out:         '{{.out | default "web/images"}}'
      concurrency: '{{.concurrency | default "3"}}'
      limit:       '{{.limit | default "0"}}'
      model:       '{{.model | default "gpt-image-2-2026-04-21"}}'
    cmd: >
      docker run --rm
      -v "{{.ROOT_DIR}}:/repo"
      -w /repo/tools/imagegen
      -e OPENAI_API_KEY
      {{.GO_IMAGE}}
      sh -c 'apt-get update -qq && apt-get install -y -q libwebp-dev && go run . -refs /repo/src/prompt -out /repo/{{.out}} -concurrency {{.concurrency}} -limit {{.limit}} -model {{.model}} /repo/{{.rooms}}'

  build:wasm:
    internal: true
    cmd: "{{.EMSDK_RUN}} make install"

  build:js:
    internal: true
    cmd: "{{.NODE_RUN}} sh -c 'npm install --silent && npm run build'"

  lint:
    desc: Run ESLint on player JS
    cmd: "{{.NODE_RUN}} sh -c 'npm install --silent && npm run lint'"

  serve:
    desc: "Serve at http://localhost:{port} (default 5173) — override with: task serve port=8787"
    vars:
      port: '{{.port | default "5173"}}'
    cmd: docker run --rm -p {{.port}}:80 -v "{{.ROOT_DIR}}:/usr/share/nginx/html:ro" {{.NGINX_IMAGE}}

  clean:
    desc: Remove build artifacts
    cmds:
      - "{{.EMSDK_RUN}} make clean"
      - "{{.ALPINE_RUN}} rm -rf /repo/dist /repo/src/dist"
