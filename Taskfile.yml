version: "3"

# IFWG build/dev tasks.
# Only requirement: https://taskfile.dev — everything else runs inside Docker.
#
# Common workflows:
#   task build         Lint, build WASM, and bundle minified player JS
#   task build:explorer  Build native dfrotz and explorer binary
#   task dist          Build and assemble deployable package in dist/
#   task lint          Run ESLint on player JS
#   task serve         Serve locally at http://localhost:5173
#   task clean         Remove build artifacts

vars:
  EMSDK_IMAGE:  emscripten/emsdk:3.1.1
  NODE_IMAGE:   node:20-alpine
  NGINX_IMAGE:  nginx:alpine
  GO_IMAGE:     golang:1.24-bookworm
  ALPINE_RUN:   docker run --rm -v "{{.ROOT_DIR}}:/src" alpine
  EMSDK_RUN:    docker run --rm -v "{{.ROOT_DIR}}:/src" -w /src/wasm {{.EMSDK_IMAGE}}
  NODE_RUN:     docker run --rm -v "{{.ROOT_DIR}}/player:/src" -w /src {{.NODE_IMAGE}}
  GO_RUN:       docker run --rm -v "{{.ROOT_DIR}}:/src" -w /src/explorer {{.GO_IMAGE}}

tasks:
  default:
    silent: true
    cmd: task --list

  build:
    desc: Lint, build WASM interpreter, and bundle minified player JS
    cmds:
      - task: lint
      - task: build:wasm
      - task: build:js

  dist:
    desc: Build and assemble deployable player package in dist/
    cmds:
      - task: build:wasm
      - task: build:js
      - "{{.ALPINE_RUN}} sh -c '\
          rm -rf /src/dist && \
          mkdir -p /src/dist/wasm /src/dist/prompt && \
          cp /src/player/index.html /src/player/player.css /src/dist/ && \
          cp -r /src/player/js /src/dist/js && \
          cp /src/player/wasm/ifwg.js /src/player/wasm/ifwg.wasm /src/dist/wasm/ && \
          cp /src/player/dist/ifwg-player.js /src/dist/ && \
          cp /src/player/prompt/* /src/dist/prompt/ \
        '"

  explore:
    desc: "Walk a game and write rooms JSON — task explore stories=C:\\path story=game.z5 [walkthrough=walkthroughs/zork1.txt] [out=rooms.json] [loop=1]"
    vars:
      out:      '{{.out | default "rooms.json"}}'
      wt_flag:  '{{if .walkthrough}}-walkthrough /src/{{.walkthrough}}{{end}}'
      lp_flag:  '{{if .loop}}-loop{{end}}'
    cmd: >
      docker run --rm
      -v "{{.ROOT_DIR}}:/src"
      -v "{{.stories}}:/stories:ro"
      -w /src/explorer
      {{.GO_IMAGE}}
      ./bin/explorer --frotz ./frotz/bin/dfrotz --out /src/{{.out}} {{.wt_flag}} {{.lp_flag}} /stories/{{.story}}

  build:explorer:
    desc: Build native dfrotz and explorer binary
    cmds:
      - "{{.GO_RUN}} make -B -C frotz"
      - "{{.GO_RUN}} sh -c 'go mod tidy && mkdir -p bin && go build -o bin/explorer .'"

  build:wasm:
    internal: true
    cmd: "{{.EMSDK_RUN}} make install"

  build:js:
    internal: true
    cmd: "{{.NODE_RUN}} sh -c 'npm install --silent && npm run build'"

  lint:
    desc: Run ESLint on player JS
    cmd: "{{.NODE_RUN}} sh -c 'npm install --silent && npm run lint'"

  serve:
    desc: "Serve at http://localhost:{port} (default 5173) — override with: task serve port=8787"
    vars:
      port: '{{.port | default "5173"}}'
    cmd: docker run --rm -p {{.port}}:80 -v "{{.ROOT_DIR}}:/usr/share/nginx/html:ro" {{.NGINX_IMAGE}}

  clean:
    desc: Remove build artifacts
    cmds:
      - "{{.EMSDK_RUN}} make clean"
      - "{{.ALPINE_RUN}} rm -rf /src/dist /src/player/dist"
