name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: task lint

      - name: Build WASM
        run: task build

      - name: Package player
        run: zip -r dist/ifwg-player.zip player/ --exclude "player/node_modules/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ifwg-player
          path: dist/ifwg-player.zip
          retention-days: 30
