<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IF With Graphics (IFWG)</title>
    <link rel="stylesheet" href="./player.css" data-ifwg-css="1">
  </head>
  <body>
    <!-- Launcher UI — owned by this page, not the player module -->
    <div id="launcher" class="drop-overlay">
      <label class="drop-target" for="ifwg-story-file">
        <span class="drop-title">DROP STORY FILE</span>
        <span class="drop-sub">or click to choose</span>
        <input id="ifwg-story-file" type="file"
               accept=".z1,.z2,.z3,.z4,.z5,.z6,.z7,.z8,.dat,.zcode">
      </label>
      <div class="drop-settings">
        <div class="setting-row">
          <label class="setting-label" for="ifwg-ai-provider">IMAGE GEN</label>
          <select id="ifwg-ai-provider" class="setting-select"></select>
        </div>
        <div class="setting-row" id="ifwg-model-row">
          <label class="setting-label" for="ifwg-ai-model">MODEL</label>
          <select id="ifwg-ai-model" class="setting-select"></select>
        </div>
        <div class="setting-row" id="ifwg-key-row">
          <label class="setting-label" for="ifwg-ai-key">API KEY</label>
          <input id="ifwg-ai-key" class="setting-input" type="password"
                 placeholder="sk-…" autocomplete="off" spellcheck="false">
        </div>
        <div class="setting-row">
          <label class="setting-label" for="ifwg-pregen">PRE-GEN</label>
          <label class="setting-toggle-wrap">
            <input id="ifwg-pregen" type="checkbox" class="setting-toggle">
            <span class="setting-toggle-track"><span class="setting-toggle-thumb"></span></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Game viewport -->
    <div id="app"></div>

    <script src="./wasm/ifwg.js"></script>

<script type="module">
      /* Dev — individual modules (no build step required) */
      import { IFWGPlayer }                                    from "./js/core.js";
      import { StandaloneConfig }                             from "./js/config.js";
      import { ImageGen, ImageGenSettings, PROVIDERS }  from "./js/imagegen/index.js";

      /* Prod — minified bundle (run: npm run build)
      import { IFWGPlayer, StandaloneConfig, ImageGen, ImageGenSettings } from "./dist/ifwg-player.js";
      */

      const config = new StandaloneConfig();
      const player = IFWGPlayer.create(document.getElementById("app"), config);

      const launcher   = document.getElementById("launcher");
      const storyFile  = document.getElementById("ifwg-story-file");
      const aiProvider = document.getElementById("ifwg-ai-provider");
      const aiModel    = document.getElementById("ifwg-ai-model");
      const aiKey      = document.getElementById("ifwg-ai-key");
      const pregen     = document.getElementById("ifwg-pregen");
      const modelRow   = document.getElementById("ifwg-model-row");
      const keyRow     = document.getElementById("ifwg-key-row");

      Object.entries(PROVIDERS).forEach(([value, { label }]) => {
        const opt = document.createElement("option");
        opt.value       = value;
        opt.textContent = label;
        aiProvider.appendChild(opt);
      });

      function populateModels(provider, selectedModel) {
        const { models = [], keyPlaceholder = "…" } = PROVIDERS[provider] || {};
        aiModel.innerHTML = models.map(m =>
          `<option value="${m.value}"${m.value === selectedModel ? " selected" : ""}>${m.label}</option>`
        ).join("");
        modelRow.hidden   = models.length === 0;
        keyRow.hidden     = models.length === 0;
        aiKey.placeholder = keyPlaceholder;
      }

      const imgSettings  = ImageGen.getSettings();
      aiProvider.value   = imgSettings.getProvider();
      if (!aiProvider.value) aiProvider.selectedIndex = 0;
      aiKey.value        = imgSettings.getApiKey();
      pregen.checked     = imgSettings.getPregenEnabled();
      populateModels(aiProvider.value, imgSettings.getModel());

      function applyImageSettings() {
        const s = ImageGen.getSettings();
        s.setProvider(aiProvider.value);
        s.setApiKey(aiKey.value.trim());
        s.setModel(aiModel.value);
        s.setPregenEnabled(pregen.checked);
        ImageGen.setSettings(s);
      }
      aiProvider.addEventListener("change", () => {
        const s = ImageGen.getSettings();
        s.setProvider(aiProvider.value);
        aiKey.value = s.getApiKey();
        populateModels(aiProvider.value, "");
        applyImageSettings();
      });
      aiModel.addEventListener("change",  applyImageSettings);
      aiKey.addEventListener("change",    applyImageSettings);
      aiKey.addEventListener("blur",      applyImageSettings);
      pregen.addEventListener("change",   applyImageSettings);

      function loadFile(file) {
        launcher.style.display = "none";
        player.loadGame(file);
      }

      storyFile.addEventListener("change", () => {
        if (storyFile.files?.[0]) loadFile(storyFile.files[0]);
      });

      launcher.addEventListener("dragover", e => {
        e.preventDefault();
        launcher.classList.add("is-dragging");
      });
      launcher.addEventListener("dragleave", () => {
        launcher.classList.remove("is-dragging");
      });
      launcher.addEventListener("drop", e => {
        e.preventDefault();
        launcher.classList.remove("is-dragging");
        if (e.dataTransfer.files?.[0]) loadFile(e.dataTransfer.files[0]);
      });
    </script>
  </body>
</html>
